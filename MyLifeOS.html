<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife.OS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' },
                        primary: '#3b82f6', // Premium Blue accent
                        accent: '#8b5cf6', // Purple for Gamification/AI
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000000; 
            color: #e4e4e7; 
            background-image: radial-gradient(circle at 50% -20%, #18181b 0%, #000000 80%);
            background-attachment: fixed;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Glassmorphism Panels */
        .glass-card {
            background: rgba(24, 24, 27, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        input, select, textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #3b82f6;
            background: rgba(9, 9, 11, 0.8);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Level Up & Notification Toast Animation */
        .level-up-toast {
            animation: slideUpFade 3s forwards;
        }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-primary/30">

    <!-- LEVEL UP TOAST CONTAINER -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none flex flex-col gap-2"></div>

    <!-- SIDEBAR -->
    <nav class="w-full md:w-72 border-b md:border-b-0 md:border-r border-zinc-800/50 bg-black/60 backdrop-blur-2xl p-4 md:p-5 flex flex-col shrink-0 z-20 h-auto md:h-full">
        
        <!-- Gamification Profile Header -->
        <div class="mb-6 bg-zinc-900/50 rounded-2xl p-4 border border-zinc-800 relative overflow-hidden group cursor-pointer" onclick="switchTab('analytics')">
            <div class="absolute inset-0 bg-gradient-to-r from-accent/20 to-primary/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-center gap-4 relative z-10">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent to-primary flex items-center justify-center text-white font-bold text-xl shadow-lg">M</div>
                <div class="flex-1">
                    <h2 class="text-sm font-bold text-white leading-none mb-1">Kaan</h2>
                    <p class="text-xs text-zinc-400">Seviye <span id="userLevel" class="text-white font-bold">1</span></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 uppercase">XP</p>
                    <p class="text-xs font-bold text-accent" id="userXP">0</p>
                </div>
            </div>
            <div class="w-full bg-zinc-950 rounded-full h-1.5 mt-3 relative z-10 border border-zinc-800">
                <div id="xpProgressBar" class="bg-gradient-to-r from-accent to-primary h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
        
        <!-- Navigation Groups -->
        <div class="flex md:flex-col gap-1 overflow-x-auto md:overflow-y-auto pb-2 md:pb-0 hide-scrollbar flex-1" id="nav-buttons">
            <!-- Rendered by JS -->
        </div>
        
    </nav>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto relative bg-[#050505]" id="main-content">
        <!-- Rendered by JS -->
    </main>

    <!-- FLOATING AI BUTTON (Quick Access) -->
    <button onclick="switchTab('ai')" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-accent to-primary rounded-full shadow-[0_0_20px_rgba(139,92,246,0.4)] flex items-center justify-center text-white hover:scale-110 transition-transform z-40">
        <i class="fa-solid fa-sparkles text-xl"></i>
    </button>

    <script>
        // ==========================================
        // 1. STATE MANAGEMENT (DATA MODEL)
        // ==========================================
        const defaultData = {
            user: { xp: 0, level: 1, coins: 0 },
            dashboard: { water: 0, sleep: 7, mood: 'Nötr' },
            aiChats: [{ role: 'assistant', text: 'Merhaba! Ben senin kişisel yapay zeka koçunum. Bugün sana nasıl yardımcı olabilirim? (Örn: Ders programı hazırla, Spor rutini öner)' }],
            tasks: { list: [] }, 
            calendar: { events: [] },
            goals: { list: [] },
            habits: { list: [] },
            journal: { entries: [] },
            secondBrain: { notes: [], folders: ['Genel', 'Okul', 'İş'] },
            finance: { transactions: [], budget: 0, subs: [] },
            focus: { totalMins: 0, sessions: 0 },
            health: { weight: [], workouts: [] },
            dates: { list: [] }
        };

        let data = JSON.parse(localStorage.getItem('mylife_ultimate_v6')) || defaultData;
        
        // Data Patching for upgrades
        if(!data.user) data.user = defaultData.user;
        if(!data.tasks) data.tasks = defaultData.tasks;
        if(!data.calendar) data.calendar = defaultData.calendar;
        if(!data.aiChats) data.aiChats = defaultData.aiChats;
        if(!data.health) data.health = defaultData.health;
        
        if(!data.settings) data.settings = { city: 'Çanakkale' };
        if(typeof data.dashboard.dailyGoal === 'undefined') data.dashboard.dailyGoal = '';

        let activeTab = 'dashboard';
        let charts = {};
        
        // Focus Timer State
        let timer = { interval: null, timeLeft: 25*60, isRunning: false, mode: 'work' };

        const getToday = () => new Date().toISOString().split('T')[0];
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- GLOBAL CONFETTI FUNCTION (Hata düzeltildi) ---
        window.triggerConfetti = () => {
            if (typeof confetti === 'function') {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, zIndex: 9999 });
            }
        };

        // --- HAVA DURUMU MOTORU (GERÇEK ZAMANLI API) ---
        let weatherCache = null;
        let isFetchingWeather = false;

        async function fetchWeatherAndRender() {
            if (isFetchingWeather) return; 
            isFetchingWeather = true;
            
            try {
                const city = data.settings?.city || 'Çanakkale';
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=tr&format=json`);
                const geoData = await geoRes.json();
                
                if (!geoData.results || geoData.results.length === 0) {
                    weatherCache = { temp: '--', city: 'Şehir Bulunamadı', icon: 'fa-cloud', color: 'text-zinc-500' };
                } else {
                    const { latitude, longitude, name } = geoData.results[0];
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    
                    const code = weatherData.current_weather.weathercode;
                    let icon = 'fa-cloud'; let color = 'text-zinc-400';
                    
                    if(code === 0) { icon = 'fa-sun'; color = 'text-yellow-400'; }
                    else if(code <= 3) { icon = 'fa-cloud-sun'; color = 'text-blue-200'; }
                    else if(code === 45 || code === 48) { icon = 'fa-smog'; color = 'text-gray-400'; }
                    else if((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) { icon = 'fa-cloud-rain'; color = 'text-blue-400'; }
                    else if(code >= 71 && code <= 77) { icon = 'fa-snowflake'; color = 'text-white'; }
                    else if(code >= 95) { icon = 'fa-bolt'; color = 'text-yellow-500'; }

                    weatherCache = { temp: Math.round(weatherData.current_weather.temperature), city: name, icon, color };
                }
            } catch (error) {
                console.error("Hava durumu çekilemedi:", error);
                weatherCache = { temp: '--', city: 'Bağlantı Hatası', icon: 'fa-triangle-exclamation', color: 'text-red-500' };
            }
            
            isFetchingWeather = false;
            if (activeTab === 'dashboard') {
                const wContainer = document.getElementById('weather-widget');
                if(wContainer) {
                    wContainer.innerHTML = `
                        <p class="text-[10px] text-zinc-400 uppercase font-bold mb-1 truncate cursor-pointer hover:text-white transition-colors" onclick="switchTab('settings')" title="Şehri Değiştir"><i class="fa-solid fa-location-dot text-red-400 mr-1"></i> ${weatherCache.city}</p>
                        <div class="flex items-center gap-2 justify-center">
                            <i class="fa-solid ${weatherCache.icon} ${weatherCache.color} text-xl"></i>
                            <span class="text-2xl font-bold">${weatherCache.temp}°C</span>
                        </div>
                    `;
                }
            }
        }

        function saveData() {
            localStorage.setItem('mylife_ultimate_v6', JSON.stringify(data));
            updateProfileUI();
        }

        // ==========================================
        // 2. GAMIFICATION ENGINE
        // ==========================================
        const XP_REQUIREMENTS = [0, 100, 250, 500, 800, 1200, 1700, 2500, 3500, 5000]; 
        
        function addXP(amount, reason) {
            data.user.xp += amount;
            let currentLevelXP = XP_REQUIREMENTS[data.user.level] || (data.user.level * 1000);
            
            if (data.user.xp >= currentLevelXP) {
                data.user.level++;
                showToast(`🎉 SEVİYE ATLADIN! Seviye ${data.user.level} oldun!`, 'level-up');
                triggerConfetti();
            } else {
                const btn = document.createElement('div');
                btn.className = 'fixed bottom-20 right-6 text-accent font-bold animate-[slideUpFade_2s_forwards] z-50 pointer-events-none';
                btn.innerHTML = `+${amount} XP <span class="text-xs font-normal text-white">(${reason})</span>`;
                document.body.appendChild(btn);
                setTimeout(() => btn.remove(), 2000);
            }
            saveData();
        }

        function updateProfileUI() {
            const lvlEl = document.getElementById('userLevel');
            const xpEl = document.getElementById('userXP');
            const bar = document.getElementById('xpProgressBar');
            if(!lvlEl) return;

            lvlEl.innerText = data.user.level;
            xpEl.innerText = data.user.xp;
            
            let prevLvlXP = XP_REQUIREMENTS[data.user.level - 1] || ((data.user.level-1) * 1000);
            let nextLvlXP = XP_REQUIREMENTS[data.user.level] || (data.user.level * 1000);
            
            let progress = ((data.user.xp - prevLvlXP) / (nextLvlXP - prevLvlXP)) * 100;
            bar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let style = 'bg-zinc-800 text-white border border-zinc-700';
            let icon = '<i class="fa-solid fa-circle-info text-blue-400"></i>';
            
            if (type === 'level-up') {
                style = 'bg-gradient-to-r from-accent to-primary text-white border-none shadow-[0_0_20px_rgba(139,92,246,0.4)]';
                icon = '<i class="fa-solid fa-crown text-yellow-300"></i>';
            } else if (type === 'success') {
                icon = '<i class="fa-solid fa-check-circle text-green-400"></i>';
            }

            toast.className = `${style} px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-3 level-up-toast text-sm`;
            toast.innerHTML = `${icon} ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==========================================
        // 3. NAVIGATION SYSTEM
        // ==========================================
        const navStructure = [
            { category: 'Ana Ekran', items: [
                { id: 'dashboard', icon: 'fa-border-all', label: 'Dashboard' },
                { id: 'ai', icon: 'fa-robot text-accent', label: 'AI Asistan' }
            ]},
            { category: 'Planlama', items: [
                { id: 'tasks', icon: 'fa-list-check', label: 'Görev Yöneticisi' },
                { id: 'calendar', icon: 'fa-calendar-days', label: 'Takvim' },
                { id: 'goals', icon: 'fa-bullseye', label: 'Hedef Sistemi' }
            ]},
            { category: 'Yaşam & Gelişim', items: [
                { id: 'habits', icon: 'fa-fire', label: 'Alışkanlıklar' },
                { id: 'journal', icon: 'fa-book-open', label: 'Günlük (Journal)' },
                { id: 'focus', icon: 'fa-stopwatch', label: 'Focus Modu' },
                { id: 'health', icon: 'fa-heart-pulse', label: 'Sağlık & Vücut' }
            ]},
            { category: 'Bilgi & Yönetim', items: [
                { id: 'secondbrain', icon: 'fa-brain', label: 'İkinci Beyin' },
                { id: 'finance', icon: 'fa-wallet', label: 'Finans & Bütçe' },
                { id: 'analytics', icon: 'fa-chart-pie', label: 'Analiz & İstatistik' }
            ]},
            { category: 'Sistem', items: [
                { id: 'settings', icon: 'fa-cloud', label: 'Senkronizasyon' }
            ]}
        ];

        function renderNav() {
            const nav = document.getElementById('nav-buttons');
            let html = '';
            navStructure.forEach(group => {
                html += `<div class="text-[10px] text-zinc-500 uppercase tracking-widest mt-5 mb-2 ml-4 hidden md:block font-semibold">${group.category}</div>`;
                group.items.forEach(tab => {
                    html += `
                    <button onclick="switchTab('${tab.id}')" 
                        class="flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all text-sm whitespace-nowrap outline-none mx-2
                        ${activeTab === tab.id 
                            ? 'bg-zinc-800/80 text-white font-semibold shadow-[0_4px_15px_rgba(0,0,0,0.5)] border border-zinc-700' 
                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'}">
                        <i class="fa-solid ${tab.icon} w-5 text-center"></i>
                        <span class="hidden md:inline">${tab.label}</span>
                    </button>`;
                });
            });
            nav.innerHTML = html;
        }

        function switchTab(tabId) {
            activeTab = tabId;
            renderNav();
            renderContent();
        }

        const Card = (content, cls='') => `<div class="glass-card rounded-2xl p-6 ${cls}">${content}</div>`;
        const SectionTitle = (title, icon) => `<h1 class="text-3xl font-bold tracking-tight mb-8 flex items-center gap-3"><i class="fa-solid ${icon} text-primary"></i> ${title}</h1>`;

        function renderContent() {
            const main = document.getElementById('main-content');
            const renderers = {
                dashboard: renderDashboard, ai: renderAI, tasks: renderTasks, calendar: renderCalendar,
                goals: renderGoals, habits: renderHabits, journal: renderJournal, focus: renderFocus,
                health: renderHealth, secondbrain: renderSecondBrain, finance: renderFinance,
                analytics: renderAnalytics, settings: renderSettings
            };
            
            window.scrollTo(0, 0);
            main.innerHTML = `<div class="fade-in p-4 md:p-8 lg:p-10 max-w-[1400px] mx-auto min-h-screen pb-32">${renderers[activeTab] ? renderers[activeTab]() : '<p>Modül Yapım Aşamasında</p>'}</div>`;

            setTimeout(() => {
                if(activeTab === 'finance') initFinanceChart();
                if(activeTab === 'health') initHealthChart();
                if(activeTab === 'analytics') initAnalyticsCharts();
                if(activeTab === 'ai') scrollToBottomAI();
            }, 50);
        }

        // --- DASHBOARD ---
        function renderDashboard() {
            const quotes = [
                "En büyük rakibin bir önceki sen.",
                "Mükemmel zamanı beklersen, hayatın beklemekle geçer.",
                "Başarı, her gün tekrarlanan küçük çabaların toplamıdır.",
                "Zorluklar seni durdurmak için değil, ne kadar istediğini test etmek içindir.",
                "Senin hayatın, senin kuralların.",
                "Başlamak için mükemmel olmak zorunda değilsin, ama mükemmel olmak için başlamak zorundasın.",
                "Motivasyon seni başlatır, disiplin devam etmeni sağlar."
            ];
            const q = quotes[Math.floor(Math.random() * quotes.length)];
            const activeTasks = data.tasks.list.filter(t => !t.completed).slice(0,4);
            const score = Math.min(100, 40 + (data.dashboard.water * 5) + (data.user.xp % 100 / 5));

            if(!weatherCache && !isFetchingWeather) fetchWeatherAndRender();

            return `
                <div class="space-y-6">
                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-4 bg-gradient-to-r from-zinc-900 to-black p-8 rounded-3xl border border-zinc-800 shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
                        <div class="relative z-10">
                            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2 text-white">Günaydın, Kaan.</h1>
                            <p class="text-zinc-400 italic font-medium"><i class="fa-solid fa-quote-left text-zinc-600 mr-2"></i> ${q}</p>
                        </div>
                        <div class="relative z-10 flex gap-4 text-center">
                            <div id="weather-widget" class="bg-black/40 backdrop-blur px-6 py-4 rounded-2xl border border-zinc-700/50 min-w-[140px] flex flex-col justify-center">
                                ${weatherCache ? `
                                    <p class="text-[10px] text-zinc-400 uppercase font-bold mb-1 truncate cursor-pointer hover:text-white transition-colors" onclick="switchTab('settings')" title="Şehri Değiştir"><i class="fa-solid fa-location-dot text-red-400 mr-1"></i> ${weatherCache.city}</p>
                                    <div class="flex items-center gap-2 justify-center">
                                        <i class="fa-solid ${weatherCache.icon} ${weatherCache.color} text-xl"></i>
                                        <span class="text-2xl font-bold">${weatherCache.temp}°C</span>
                                    </div>
                                ` : `
                                    <p class="text-[10px] text-zinc-500 uppercase font-bold mb-1"><i class="fa-solid fa-cloud-sun mr-1"></i> Hava</p>
                                    <i class="fa-solid fa-spinner fa-spin text-zinc-500 text-xl mt-1"></i>
                                `}
                            </div>
                            <div class="bg-black/40 backdrop-blur px-6 py-4 rounded-2xl border border-zinc-700/50">
                                <p class="text-xs text-zinc-500 uppercase font-bold mb-1">Günün Skoru</p>
                                <p class="text-2xl font-bold ${score > 70 ? 'text-green-400' : 'text-yellow-400'}">${Math.floor(score)}<span class="text-sm text-zinc-600">/100</span></p>
                            </div>
                        </div>
                    </div>
                    
                    ${Card(`
                        <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-3"><i class="fa-solid fa-bullseye text-red-400 mr-2"></i>Günün Odak Noktası (Ana Hedef)</h3>
                        <input type="text" value="${data.dashboard.dailyGoal}" onchange="dashAction('dailyGoal', this.value, true)" placeholder="Bugün başarmak istediğin tek ve en önemli hedef..." class="w-full bg-zinc-900/80 border border-zinc-800 rounded-xl p-4 text-sm font-medium focus:border-primary transition-colors">
                    `, 'mb-6')}

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Öncelikli Görevler</h3>
                            <div class="space-y-3">
                                ${activeTasks.length === 0 ? '<p class="text-zinc-600 text-sm">Harika! Tüm işler bitti.</p>' : activeTasks.map(t => `
                                    <div class="flex items-center gap-3 p-3 bg-zinc-900/50 rounded-xl border border-zinc-800 group cursor-pointer" onclick="toggleTask('${t.id}')">
                                        <div class="w-3 h-3 rounded-full ${t.priority === 'high' ? 'bg-red-500' : t.priority === 'med' ? 'bg-yellow-500' : 'bg-blue-500'} group-hover:scale-110 transition-transform"></div>
                                        <span class="text-sm text-zinc-200 truncate group-hover:text-white transition-colors">${t.text}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="switchTab('tasks')" class="mt-4 w-full text-xs text-zinc-400 hover:text-white py-2 bg-zinc-900 rounded-lg transition-colors">Tümünü Gör</button>
                        `)}
                        
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Biyolojik Metrikler</h3>
                            <div class="space-y-5">
                                <div class="flex justify-between items-center">
                                    <span class="text-sm"><i class="fa-solid fa-glass-water text-blue-400 mr-2"></i> Su (Bardak)</span>
                                    <div class="flex items-center gap-3 bg-black rounded-lg border border-zinc-800 p-1">
                                        <button onclick="dashAction('water', -1)" class="w-6 h-6 bg-zinc-800 rounded hover:bg-zinc-700">-</button>
                                        <span class="w-4 text-center font-bold">${data.dashboard.water}</span>
                                        <button onclick="dashAction('water', 1)" class="w-6 h-6 bg-zinc-800 rounded hover:bg-zinc-700">+</button>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm"><i class="fa-solid fa-moon text-indigo-400 mr-2"></i> Uyku</span>
                                    <input type="number" value="${data.dashboard.sleep}" onchange="dashAction('sleep', this.value, true)" class="w-16 py-1 px-2 text-center rounded-lg">
                                </div>
                            </div>
                        `)}

                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Hızlı Not</h3>
                            <textarea placeholder="Aklına geleni anında yaz..." oninput="silentSaveQuickNote(this.value)" class="w-full h-32 p-3 rounded-xl resize-none text-sm leading-relaxed">${localStorage.getItem('mylife_quickNote') || ''}</textarea>
                        `)}
                    </div>
                </div>
            `;
        }

        window.dashAction = (k, v, isSet=false) => {
            if(isSet) data.dashboard[k] = v;
            else data.dashboard[k] = Math.max(0, data.dashboard[k] + v);
            
            if(k === 'water' && v > 0) addXP(5, 'Su içildi');
            saveData(); renderContent();
        }
        window.silentSaveQuickNote = (val) => {

        function renderFocus() {

                        </div>
                    </div>

                    <div class="flex gap-6">
                        <button onclick="toggleTimer()" class="w-20 h-20 rounded-full bg-white text-black text-2xl flex items-center justify-center hover:scale-105 transition-transform shadow-xl">
                            <i id="tIcon" class="fa-solid ${timer.isRunning ? 'fa-pause' : 'fa-play ml-1'}"></i>
                        </button>
                        <button onclick="resetTimer()" class="w-20 h-20 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 text-xl flex items-center justify-center hover:bg-zinc-800 hover:text-white transition-colors">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                    </div>
                    
                    <div class="glass-card px-8 py-4 rounded-full flex gap-8 border-primary/20">
                        <div class="text-center"><p class="text-xs text-zinc-500 uppercase font-bold">Bugün</p><p class="text-xl font-bold text-white">${data.focus.sessions} Seans</p></div>
                        <div class="w-px bg-zinc-800"></div>
                        <div class="text-center"><p class="text-xs text-zinc-500 uppercase font-bold">Toplam</p><p class="text-xl font-bold text-accent">${data.focus.totalMins} Dk</p></div>
                    </div>
                </div>
            `;
        }

        window.updateTimerUI = () => {
            const d = document.getElementById('tDisplay');
            const i = document.getElementById('tIcon');
            if(!d) return;
            const m = Math.floor(timer.timeLeft / 60).toString().padStart(2, '0');
            const s = (timer.timeLeft % 60).toString().padStart(2, '0');
            d.innerText = `${m}:${s}`;
            if(i) i.className = `fa-solid ${timer.isRunning ? 'fa-pause' : 'fa-play ml-1'}`;
        }
        window.toggleTimer = () => {
            if(timer.isRunning) { clearInterval(timer.interval); timer.isRunning = false; }
            else {
                timer.isRunning = true;
                timer.interval = setInterval(() => {
                    if(timer.timeLeft > 0) { timer.timeLeft--; updateTimerUI(); }
                    else {
                        clearInterval(timer.interval); timer.isRunning = false;
                        if(timer.mode === 'work') {
                            data.focus.sessions++; data.focus.totalMins += 25;
                            addXP(25, 'Pomodoro tamamlandı'); triggerConfetti();
                            setFocus('break');
                        } else { setFocus('work'); }
                        saveData();
                    }
                }, 1000);
            }
            renderContent();
        }
        window.resetTimer = () => { clearInterval(timer.interval); timer.isRunning = false; timer.timeLeft = timer.mode === 'work' ? 25*60 : 5*60; renderContent(); }
        window.setFocus = (m) => { clearInterval(timer.interval); timer.isRunning = false; timer.mode = m; timer.timeLeft = m === 'work' ? 25*60 : 5*60; renderContent(); }

                            ${data.habits.list.map(h => {
                                const isDone = h.history.includes(todayStr);
                                return `
                                <div class="p-5 bg-zinc-900/50 border ${isDone ? 'border-primary/50' : 'border-zinc-800'} rounded-2xl flex items-center gap-4 transition-all hover:bg-zinc-800/50">
                                    <button onclick="toggleHab('${h.id}')" class="w-16 h-16 shrink-0 rounded-2xl text-3xl flex items-center justify-center transition-all shadow-inner border border-zinc-700 bg-black ${isDone ? 'bg-gradient-to-br from-primary to-accent border-none text-white shadow-[0_0_20px_rgba(59,130,246,0.4)]' : ''}">
                                        ${h.icon || '🔥'}
                                    </button>
                                    <div class="flex-1">
                                        <h4 class="font-bold text-white text-lg">${h.name}</h4>
                                        <p class="text-xs text-zinc-400 mt-1">Zincir: <span class="font-bold ${h.streak > 0 ? 'text-accent' : 'text-zinc-500'}">${h.streak} Gün</span></p>
                                    </div>
                                    <button onclick="delHab('${h.id}')" class="w-8 h-8 rounded-full bg-zinc-800 text-zinc-500 hover:text-red-500 hover:bg-zinc-700 flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                `
                            }).join('')}
                        </div>
                    `)}
                </div>
            `;
        }
        window.addHab = () => {
            const i = document.getElementById('hIco').value, n = document.getElementById('hNam').value;
            if(n) { data.habits.list.push({ id: generateId(), icon: i, name: n, streak: 0, history: [] }); saveData(); renderContent(); }
        }
        window.toggleHab = (id) => {
            const h = data.habits.list.find(x => x.id === id), today = getToday();
            if(h.history.includes(today)) { h.history = h.history.filter(d => d !== today); h.streak = Math.max(0, h.streak-1); }
            else { h.history.push(today); h.streak++; addXP(20, 'Alışkanlık korundu'); triggerConfetti(); }
            saveData(); renderContent();
        }
        window.delHab = (id) => { data.habits.list = data.habits.list.filter(h => h.id !== id); saveData(); renderContent(); }

        // --- CALENDAR (Takvim) ---
        function renderCalendar() {
            const sorted = [...data.calendar.events].sort((a,b) => new Date(a.date) - new Date(b.date));
            return `
                <div class="space-y-6">
                    ${SectionTitle('Ajanda & Takvim', 'fa-calendar-days')}
                    ${Card(`
                        <div class="flex flex-col md:flex-row gap-3 mb-8">
                            <input id="cDate" type="date" class="px-4 py-3 rounded-xl border border-zinc-800 text-sm text-zinc-300 invert-[.9]">
                            <input id="cName" placeholder="Etkinlik Adı (Sınav, Toplantı, Doğum Günü)" class="flex-1 px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                            <button onclick="addCal()" class="bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">Planla</button>
                        </div>
                        <div class="space-y-3">
                            ${sorted.length === 0 ? '<p class="text-zinc-500 text-sm italic">Yaklaşan etkinlik yok.</p>' : ''}
                            ${sorted.map(e => {
                                const diff = Math.ceil((new Date(e.date) - new Date()) / (1000 * 60 * 60 * 24));
                                const isPast = diff < 0;
                                return `
                                <div class="p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl flex justify-between items-center group">
                                    <div class="flex items-center gap-4">
                                        <div class="bg-black border border-zinc-700 rounded-lg p-2 text-center w-14">
                                            <p class="text-[10px] text-zinc-500 uppercase font-bold">${new Date(e.date).toLocaleDateString('tr-TR', {month:'short'})}</p>
                                            <p class="text-lg font-bold text-white">${new Date(e.date).getDate()}</p>
                                        </div>
                                        <p class="font-medium ${isPast ? 'line-through text-zinc-600' : 'text-zinc-200'}">${e.title}</p>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        ${isPast ? '<span class="text-xs bg-zinc-800 px-2 py-1 rounded text-zinc-500">Geçti</span>' : 
                                          diff === 0 ? '<span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded font-bold">Bugün</span>' :
                                          `<span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded">${diff} Gün Sonra</span>`
                                        }
                                        <button onclick="delCal('${e.id}')" class="text-red-500/0 group-hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    `)}
                </div>
            `;
        }
        window.addCal = () => {
            const d = document.getElementById('cDate').value, n = document.getElementById('cName').value;
            if(d && n) { data.calendar.events.push({ id: generateId(), date: d, title: n }); saveData(); renderContent(); }
        }
        window.delCal = (id) => { data.calendar.events = data.calendar.events.filter(x => x.id !== id); saveData(); renderContent(); }

        // --- GOALS (Hedefler) ---
        function renderGoals() {
            return `
                <div class="space-y-6">
                    ${SectionTitle('Hedef Sistemi', 'fa-bullseye')}
                    ${Card(`
                        <div class="flex flex-col md:flex-row gap-3 mb-8">
                            <input id="gName" placeholder="Yeni büyük hedef belirle..." class="flex-1 px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                            <button onclick="addGoal()" class="bg-white text-black px-6 py-3 rounded-xl font-bold hover:bg-zinc-200 transition-colors">Oluştur</button>
                        </div>
                        <div class="space-y-6">
                            ${data.goals.list.map(g => `
                                <div class="p-5 bg-zinc-900/50 border border-zinc-800 rounded-2xl">
                                    <div class="flex justify-between items-end mb-3">
                                        <h4 class="font-bold text-white text-lg">${g.title}</h4>
                                        <span class="text-sm font-bold text-accent">${g.prog}%</span>
                                    </div>
                                    <div class="w-full bg-black rounded-full h-3 border border-zinc-800 mb-4 overflow-hidden">
                                        <div class="bg-gradient-to-r from-accent to-primary h-3 rounded-full transition-all duration-700" style="width: ${g.prog}%"></div>
                                    </div>
                                    <div class="flex flex-wrap gap-2 items-center">
                                        <span class="text-xs text-zinc-500 mr-2">İlerleme:</span>
                                        ${[0, 25, 50, 75, 100].map(v => `<button onclick="upGoal('${g.id}', ${v})" class="text-[10px] px-2 py-1 rounded border ${g.prog>=v?'bg-white text-black border-white':'border-zinc-700 text-zinc-400 hover:border-zinc-500'} font-bold transition-colors">${v}%</button>`).join('')}
                                        <button onclick="delGoal('${g.id}')" class="ml-auto text-red-500/50 hover:text-red-500 text-xs px-2 py-1 transition-colors"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `)}
                </div>
            `;
        }
        window.addGoal = () => { const n=document.getElementById('gName').value; if(n){ data.goals.list.push({id:generateId(), title:n, prog:0}); saveData(); renderContent(); } }
        window.upGoal = (id,v) => { const g=data.goals.list.find(x=>x.id===id); if(g){ g.prog=v; if(v===100){addXP(100,'Büyük Hedef Tamamlandı!'); triggerConfetti();} saveData(); renderContent(); } }
        window.delGoal = (id) => { data.goals.list=data.goals.list.filter(x=>x.id!==id); saveData(); renderContent(); }

        // --- JOURNAL (Günlük) ---
        function renderJournal() {
            return `
                <div class="space-y-6 h-full flex flex-col">
                    ${SectionTitle('Dijital Günlük', 'fa-book-open')}
                    ${Card(`
                        <textarea id="jEntry" placeholder="Bugün nasıl geçti? Hislerini buraya dök..." class="w-full h-32 p-4 rounded-xl border border-zinc-800 text-sm resize-none mb-4 bg-black/50"></textarea>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-zinc-500 font-bold uppercase"><i class="fa-solid fa-clock"></i> ${new Date().toLocaleDateString('tr-TR')}</span>
                            <button onclick="addJournal()" class="bg-primary text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 transition-colors">Sayfaya Ekle</button>
                        </div>
                    `, 'mb-6')}
                    <div class="space-y-4 flex-1 overflow-y-auto hide-scrollbar">
                        ${data.journal.entries.slice().reverse().map(j => `
                            <div class="glass-card border border-zinc-800 rounded-2xl p-6 relative group">
                                <p class="text-[10px] uppercase font-bold text-accent mb-3 inline-block bg-accent/10 px-2 py-1 rounded">${j.date}</p>
                                <p class="text-sm text-zinc-300 whitespace-pre-wrap leading-relaxed">${j.text}</p>
                                <button onclick="delJournal('${j.id}')" class="absolute top-4 right-4 text-red-500/0 group-hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        window.addJournal = () => { const t=document.getElementById('jEntry').value; if(t){ data.journal.entries.push({id:generateId(), text:t, date:getToday()}); addXP(10, 'Günlük yazıldı'); saveData(); renderContent(); } }
        window.delJournal = (id) => { data.journal.entries=data.journal.entries.filter(x=>x.id!==id); saveData(); renderContent(); }

        // --- FINANCE ---
        function renderFinance() {
            let inc=0, exp=0; data.finance.transactions.forEach(t => t.type==='inc'?inc+=t.amount:exp+=t.amount);
            return `
                <div class="space-y-6">
                    ${SectionTitle('Finans & Bütçe', 'fa-wallet')}
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div class="bg-gradient-to-br from-zinc-800 to-black p-6 rounded-3xl border border-zinc-700 shadow-xl">
                            <p class="text-[10px] font-bold uppercase text-zinc-400 tracking-wider mb-2">Net Bakiye</p>
                            <p class="text-3xl font-extrabold text-white">${(inc-exp).toLocaleString('tr-TR')} ₺</p>
                        </div>
                        <div class="glass-card p-6 rounded-3xl border border-zinc-800">
                            <p class="text-[10px] font-bold uppercase text-zinc-500 tracking-wider mb-2">Gelirler</p>
                            <p class="text-2xl font-light text-green-400">+${inc.toLocaleString('tr-TR')} ₺</p>
                        </div>
                        <div class="glass-card p-6 rounded-3xl border border-zinc-800">
                            <p class="text-[10px] font-bold uppercase text-zinc-500 tracking-wider mb-2">Giderler</p>
                            <p class="text-2xl font-light text-red-400">-${exp.toLocaleString('tr-TR')} ₺</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Hızlı İşlem Ekle</h3>
                            <div class="space-y-4">
                                <div class="flex gap-3">
                                    <select id="fType" class="px-4 py-3 rounded-xl border border-zinc-800 bg-black text-sm w-1/3">
                                        <option value="exp">Gider (-)</option><option value="inc">Gelir (+)</option>
                                    </select>
                                    <input id="fAmt" type="number" placeholder="Tutar ₺" class="flex-1 px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                                </div>
                                <input id="fDesc" placeholder="Kategori/Açıklama" class="w-full px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                                <button onclick="addFin()" class="w-full bg-white text-black py-3 rounded-xl font-bold hover:bg-zinc-200 transition-colors">Kaydet</button>
                            </div>
                        `)}
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Nakit Akışı (Son 7)</h3>
                            <div class="h-40 w-full"><canvas id="finChart"></canvas></div>
                        `)}
                    </div>
                </div>
            `;
        }
        window.addFin = () => { const t=document.getElementById('fType').value, a=document.getElementById('fAmt').value, d=document.getElementById('fDesc').value; if(a&&d){ data.finance.transactions.push({id:generateId(), type:t, amount:parseFloat(a), desc:d, date:getToday()}); saveData(); renderContent(); } }
        function initFinanceChart() {
            const ctx = document.getElementById('finChart'); if(!ctx) return;
            if(charts['fin']) charts['fin'].destroy();
            const txs = data.finance.transactions.slice(-7).reverse();
            charts['fin'] = new Chart(ctx, { type: 'bar', data: { labels: txs.map(t=>t.desc.substring(0,8)), datasets: [{ data: txs.map(t=>t.amount), backgroundColor: txs.map(t=>t.type==='inc'?'#4ade80':'#f87171'), borderRadius: 6 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
        }

        // --- HEALTH (Sağlık) ---
        function renderHealth() {
            return `
                <div class="space-y-6">
                    ${SectionTitle('Sağlık & Fizik', 'fa-heart-pulse')}
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Kilo Grafiği</h3>
                            <div class="flex gap-3 mb-6">
                                <input type="number" step="0.1" id="wInput" placeholder="Kilo (kg)" class="flex-1 px-4 py-2 rounded-xl border border-zinc-800 text-sm">
                                <button onclick="addWeight()" class="bg-primary text-white px-6 rounded-xl font-bold hover:bg-blue-600 transition-colors">Ekle</button>
                            </div>
                            <div class="h-48 w-full"><canvas id="weightChart"></canvas></div>
                        `)}
                        ${Card(`
                            <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">Antrenman Ekle</h3>
                            <div class="space-y-4">
                                <select id="woType" class="w-full px-4 py-3 rounded-xl border border-zinc-800 text-sm bg-black">
                                    <option>Ağırlık (Gym)</option><option>Kardiyo (Koşu)</option><option>Yüzme</option><option>Yoga</option>
                                </select>
                                <input type="number" id="woDur" placeholder="Süre (Dakika)" class="w-full px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                                <button onclick="addWorkout()" class="w-full bg-white text-black py-3 rounded-xl font-bold hover:bg-zinc-200 transition-colors">Kaydet</button>
                            </div>
                            <div class="mt-6 space-y-2 max-h-32 overflow-y-auto hide-scrollbar">
                                ${data.health.workouts.slice().reverse().map(w => `<div class="p-3 bg-zinc-900/50 rounded-xl flex justify-between text-sm"><span class="font-bold">${w.type}</span><span class="text-zinc-400">${w.duration} dk</span></div>`).join('')}
                            </div>
                        `)}
                    </div>
                </div>
            `;
        }
        window.addWeight = () => { const w=document.getElementById('wInput').value; if(w){ data.health.weight.push({date:getToday(), val:parseFloat(w)}); saveData(); renderContent(); } }
        window.addWorkout = () => { const t=document.getElementById('woType').value, d=document.getElementById('woDur').value; if(d){ data.health.workouts.push({type:t, duration:d}); addXP(30, 'Antrenman yapıldı'); triggerConfetti(); saveData(); renderContent(); } }
        function initHealthChart() {
            const ctx = document.getElementById('weightChart'); if(!ctx) return;
            if(charts['weight']) charts['weight'].destroy();
            const ws = data.health.weight.slice(-10);
            charts['weight'] = new Chart(ctx, { type: 'line', data: { labels: ws.map(w=>w.date.substring(5)), datasets: [{ data: ws.map(w=>w.val), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', tension: 0.4, fill: true, pointBackgroundColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } } });
        }

        // --- ANALYTICS ---
        function renderAnalytics() {
            return `
                <div class="space-y-6">
                    ${SectionTitle('Genel Analiz & Oyunlaştırma', 'fa-chart-pie')}
                    ${Card(`
                        <h3 class="font-bold text-zinc-400 uppercase text-xs tracking-wider mb-5">XP İlerlemesi (Oyunlaştırma)</h3>
                        <div class="h-64 w-full flex items-center justify-center border border-dashed border-zinc-800 rounded-2xl bg-black/20">
                            <div class="text-center">
                                <div class="text-6xl mb-4">🏆</div>
                                <h2 class="text-2xl font-bold text-white mb-2">Seviye ${data.user.level} Kaan</h2>
                                <p class="text-zinc-500">Toplam XP: <span class="text-accent font-bold">${data.user.xp}</span></p>
                            </div>
                        </div>
                    `)}
                </div>
            `;
        }
        function initAnalyticsCharts() { /* Space left for future advanced charts */ }

        // --- SETTINGS (Ayarlar) ---
        function renderSettings() {
            return `
                <div class="space-y-6 max-w-2xl">
                    ${SectionTitle('Sistem & Ayarlar', 'fa-cloud')}
                    
                    ${Card(`
                        <h3 class="text-white font-bold mb-4"><i class="fa-solid fa-user-gear mr-2 text-primary"></i>Kişisel Ayarlar</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-xs text-zinc-500 font-bold uppercase mb-2 block">Hava Durumu İçin Şehir</label>
                                <div class="flex gap-3">
                                    <input type="text" id="cityInput" value="${data.settings?.city || 'Çanakkale'}" placeholder="Şehir Adı..." class="flex-1 px-4 py-3 rounded-xl border border-zinc-800 text-sm">
                                    <button onclick="saveCity()" class="bg-zinc-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-zinc-700 transition-colors">Güncelle</button>
                                </div>
                                <p class="text-[10px] text-zinc-600 mt-2">Güncellediğinizde hava durumu widget'ı anında bulunduğunuz şehre odaklanır.</p>
                            </div>
                        </div>
                    `, 'mb-6')}

                    ${Card(`
                        <h3 class="text-white font-bold mb-2"><i class="fa-solid fa-hard-drive mr-2 text-accent"></i>Lokal Bulut (Veri Yönetimi)</h3>
                        <p class="text-xs text-zinc-500 mb-6 leading-relaxed">Verileriniz Google Drive vb. yerlere değil, doğrudan tarayıcınıza kaydedilir. Bu JSON dosyasını indirerek telefonunuza veya başka tarayıcıya aktarabilirsiniz.</p>
                        <div class="space-y-4">
                            <button onclick="exportData()" class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors flex items-center justify-center gap-2"><i class="fa-solid fa-download"></i> Yedeği İndir (.json)</button>
                            <div class="relative">
                                <input type="file" accept=".json" onchange="importData(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                <div class="w-full bg-zinc-900 border border-zinc-800 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 pointer-events-none"><i class="fa-solid fa-upload"></i> Yedeği Yükle</div>
                            </div>
                            <button onclick="clearData()" class="w-full bg-red-500/10 text-red-500 border border-red-500/20 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition-colors mt-8">Tüm Sistemi Sıfırla</button>
                        </div>
                    `)}
                </div>
            `;
        }

        window.saveCity = () => {
            const city = document.getElementById('cityInput').value.trim();
            if(city) {
                data.settings.city = city;
                saveData();
                weatherCache = null; 
                fetchWeatherAndRender(); 
                showToast(`Şehir "${city}" olarak güncellendi.`, 'success');
            }
        }

        window.exportData = () => {
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `MyLife_OS_Backup.json`;
            a.click(); URL.revokeObjectURL(url);
        }
        window.importData = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (ev) => { 
                try { 
                    data = JSON.parse(ev.target.result); 
                    saveData(); 
                    renderContent(); 
                    showToast('Yedek başarıyla yüklendi!', 'success'); 
                } catch(err) { 
                    showToast('Hatalı dosya formatı.', 'error'); 
                } 
            }
            r.readAsText(f);
        }
        window.clearData = () => {
            data = JSON.parse(JSON.stringify(defaultData));
            saveData(); 
            switchTab('dashboard');
            showToast('Sistem başarıyla sıfırlandı.', 'success');
        }

        // INIT
        renderNav();
        renderContent();
        updateProfileUI();
    </script>
</body>
</html>
